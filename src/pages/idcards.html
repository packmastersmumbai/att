<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employee ID Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #000666;
      --teal: #006b5f;
      --bg: #f1f5f9;
      --card-w: 85.6mm;  /* standard ID card width */
      --card-h: 54mm;    /* standard ID card height */
    }

    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      background: var(--bg);
      color: #1b1c1c;
      padding: 20px;
    }

    /* ── Screen controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .controls h1 {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      flex: 1;
    }
    .controls span {
      font-size: 12px;
      color: #64748b;
    }
    .btn-print {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-print:hover { background: #000444; }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: #fff;
      color: var(--primary);
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }

    /* ── Filter / sort bar ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar input, .filter-bar select {
      padding: 7px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
    }
    .filter-bar input { width: 200px; }
    .card-count {
      font-size: 12px;
      color: #64748b;
      margin-left: auto;
    }

    /* ── Card grid ── */
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* ── ID Card ── */
    .id-card {
      width: var(--card-w);
      height: var(--card-h);
      background: #fff;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      position: relative;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    /* Top colour band */
    .card-band {
      height: 9mm;
      background: var(--primary);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      flex-shrink: 0;
    }
    .card-band-logo {
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,.15);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .card-band-org {
      font-size: 8px;
      font-weight: 700;
      color: rgba(255,255,255,.9);
      text-transform: uppercase;
      letter-spacing: 1px;
      flex: 1;
    }
    .card-band-type {
      font-size: 7px;
      font-weight: 700;
      color: rgba(255,255,255,.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Card body */
    .card-body {
      display: flex;
      flex: 1;
      padding: 6px 8px 6px 8px;
      gap: 8px;
      align-items: center;
      min-height: 0;
    }

    /* Photo / avatar */
    .card-photo {
      width: 28mm;
      height: 28mm;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .card-av {
      width: 28mm;
      height: 28mm;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      border: 1px solid #e2e8f0;
    }

    /* Info column */
    .card-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      justify-content: center;
    }
    .card-name {
      font-size: 11px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-dept {
      font-size: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--teal);
      margin-bottom: 2px;
    }
    .card-id-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .card-id-lbl {
      font-size: 7px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #94a3b8;
    }
    .card-id-val {
      font-size: 9px;
      font-weight: 700;
      color: var(--primary);
      font-family: 'Roboto Mono', monospace;
    }
    .card-divider {
      border: none;
      border-top: 1px dashed #e2e8f0;
      margin: 3px 0;
    }
    .card-meta {
      font-size: 7.5px;
      color: #64748b;
      line-height: 1.5;
    }
    .card-meta span { font-weight: 600; color: #475569; }

    /* QR section */
    .card-qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }
    .card-qr img {
      width: 22mm;
      height: 22mm;
      display: block;
      image-rendering: pixelated;
    }
    .card-qr-code {
      font-size: 6.5px;
      font-family: 'Roboto Mono', monospace;
      color: #475569;
      text-align: center;
      font-weight: 600;
      letter-spacing: .3px;
    }

    /* Bottom strip */
    .card-footer {
      height: 5mm;
      background: #f8fafc;
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      flex-shrink: 0;
    }
    .card-footer-left {
      font-size: 6.5px;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .card-footer-right {
      font-size: 6.5px;
      color: #94a3b8;
      font-weight: 600;
      font-family: 'Roboto Mono', monospace;
    }

    /* Empty state */
    .empty {
      padding: 48px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
      width: 100%;
    }

    /* ══════════════════════════════════════
       PRINT STYLES
    ══════════════════════════════════════ */
    @media print {
      body {
        background: #fff;
        padding: 0;
        margin: 0;
      }
      .controls, .filter-bar { display: none !important; }

      .card-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 4mm;
        padding: 6mm;
      }

      .id-card {
        box-shadow: none;
        border: 0.5pt solid #ccc;
        border-radius: 4pt;
      }
    }

    @page {
      size: A4 portrait;
      margin: 8mm;
    }
  </style>
</head>
<body>

  <!-- Screen-only controls -->
  <div class="controls no-print">
    <h1>Employee ID Cards — <?= orgName ?></h1>
    <a class="btn-back" href="?page=admin">← Back to Admin</a>
    <button class="btn-print" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6,9 6,2 18,2 18,9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print / Save PDF
    </button>
  </div>

  <div class="filter-bar no-print">
    <input type="text" id="searchInput" placeholder="Search name or ID…" oninput="filterCards()">
    <select id="deptFilter" onchange="filterCards()">
      <option value="">All Departments</option>
    </select>
    <select id="statusFilter" onchange="filterCards()">
      <option value="">All Status</option>
      <option value="ACTIVE">Active</option>
      <option value="INACTIVE">Inactive</option>
    </select>
    <span class="card-count" id="cardCount"></span>
  </div>

  <div id="debugBanner" style="display:none;background:#fef3c7;border:1px solid #f59e0b;border-radius:4px;padding:10px 16px;margin-bottom:12px;font-size:13px;color:#92400e;"></div>
  <? if (idcardsError) { ?>
  <div style="background:#fee2e2;border:1px solid #ef4444;border-radius:4px;padding:10px 16px;margin-bottom:12px;font-size:13px;color:#991b1b;">Server error: <?= idcardsError ?></div>
  <? } ?>
  <div class="card-grid" id="cardGrid"></div>

  <script>
    var ORG = <?!= JSON.stringify(orgName || 'My Organisation') ?>;
    var EMPLOYEES = <?!= employeesJson || '[]' ?>;
    (function() {
      var banner = document.getElementById('debugBanner');
      if (!EMPLOYEES || !EMPLOYEES.length) {
        banner.style.display = 'block';
        banner.textContent = 'No employee data loaded from the sheet. Check that the Employees tab exists and has rows.';
      }
    })();

    var COLORS = ['#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981','#06B6D4','#EF4444','#6366F1','#84CC16','#F97316'];
    function pickColor(name) {
      var n = 0;
      for (var i = 0; i < (name||'').length; i++) n += name.charCodeAt(i);
      return COLORS[n % COLORS.length];
    }
    function initials(name) {
      var p = String(name||' ').trim().split(/\s+/);
      return ((p[0]||'')[0] + ((p[1]||'')[0]||'')).toUpperCase();
    }
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // Populate dept filter
    var depts = [];
    EMPLOYEES.forEach(function(e) { if (e.Department && depts.indexOf(e.Department) === -1) depts.push(e.Department); });
    depts.sort();
    var deptSel = document.getElementById('deptFilter');
    depts.forEach(function(d) {
      var o = document.createElement('option');
      o.value = d; o.textContent = d;
      deptSel.appendChild(o);
    });

    function qrUrl(code) {
      return 'https://api.qrserver.com/v1/create-qr-code/?size=88x88&ecc=M&data=' + encodeURIComponent(code);
    }

    function renderCard(emp) {
      var c = pickColor(emp.Name || '');
      var ini = initials(emp.Name || '');
      var photoHtml = emp.PhotoURL
        ? '<img class="card-photo" src="' + esc(emp.PhotoURL) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
          '<div class="card-av" style="display:none;background:' + c + '18;color:' + c + '">' + esc(ini) + '</div>'
        : '<div class="card-av" style="background:' + c + '18;color:' + c + '">' + esc(ini) + '</div>';

      var qrImgSrc = emp.QRImageURL || qrUrl(emp.QRCode || emp.EmpID || '');

      return '<div class="id-card" data-name="' + esc((emp.Name||'').toLowerCase()) +
             '" data-id="' + esc(String(emp.EmpID||'').toLowerCase()) +
             '" data-dept="' + esc(emp.Department||'') +
             '" data-status="' + esc(emp.Status||'') + '">' +

        '<div class="card-band">' +
          '<div class="card-band-logo">QR</div>' +
          '<div class="card-band-org">' + esc(ORG) + '</div>' +
          '<div class="card-band-type">Employee</div>' +
        '</div>' +

        '<div class="card-body">' +
          photoHtml +
          '<div class="card-info">' +
            '<div class="card-name">' + esc(emp.Name || '–') + '</div>' +
            '<div class="card-dept">' + esc(emp.Department || '') + '</div>' +
            '<hr class="card-divider">' +
            '<div class="card-id-row">' +
              '<span class="card-id-lbl">ID</span>' +
              '<span class="card-id-val">' + esc(emp.EmpID || '') + '</span>' +
            '</div>' +
            (emp.Phone ? '<div class="card-meta"><span>Ph:</span> ' + esc(emp.Phone) + '</div>' : '') +
            (emp.Email ? '<div class="card-meta"><span>Em:</span> ' + esc(emp.Email) + '</div>' : '') +
          '</div>' +
          '<div class="card-qr">' +
            '<img src="' + esc(qrImgSrc) + '" onerror="this.src=\'' + qrUrl(emp.QRCode || emp.EmpID || '') + '\'">' +
            '<div class="card-qr-code">' + esc(emp.QRCode || emp.EmpID || '') + '</div>' +
          '</div>' +
        '</div>' +

        '<div class="card-footer">' +
          '<span class="card-footer-left">QR Attendance System</span>' +
          '<span class="card-footer-right">' + esc(emp.Status || 'ACTIVE') + '</span>' +
        '</div>' +

      '</div>';
    }

    var _filtered = EMPLOYEES;

    function filterCards() {
      var q   = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      var dept = document.getElementById('deptFilter').value;
      var stat = document.getElementById('statusFilter').value;

      _filtered = EMPLOYEES.filter(function(e) {
        if (q && (e.Name||'').toLowerCase().indexOf(q) === -1 && String(e.EmpID||'').toLowerCase().indexOf(q) === -1) return false;
        if (dept && e.Department !== dept) return false;
        if (stat && e.Status !== stat) return false;
        return true;
      });
      renderGrid();
    }

    function renderGrid() {
      var grid = document.getElementById('cardGrid');
      var count = document.getElementById('cardCount');
      if (!_filtered.length) {
        grid.innerHTML = '<div class="empty">No employees match the current filter.</div>';
        count.textContent = '0 cards';
        return;
      }
      grid.innerHTML = _filtered.map(renderCard).join('');
      count.textContent = _filtered.length + ' card' + (_filtered.length !== 1 ? 's' : '');
    }

    renderGrid();
  </script>
</body>
</html>
