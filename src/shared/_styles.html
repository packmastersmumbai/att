<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
  /* ── Stitch Design Tokens ── */
  :root {
    --color-primary:     #000666;
    --color-primary-dk:  #000444;
    --color-success:     #006b5f;
    --color-danger:      #DC2626;
    --color-warning:     #D97706;
    --color-bg:          #fcf9f8;
    --color-surface:     #ffffff;
    --color-border:      #e8e3e0;
    --color-text:        #1b1c1c;
    --color-text-muted:  #64748B;
    --color-blocked:     #7C3AED;
    --radius-sm:  2px;
    --radius-md:  4px;
    --radius-lg:  8px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 12px rgba(0,0,0,.12);
    --font-sans: 'Public Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); font-size: 15px; }
  a { color: inherit; text-decoration: none; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; font-size: inherit; }
  html, body    { height: 100%; }
  .app-shell    { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .page-content { flex: 1; overflow-y: auto; padding: 20px; max-width: 960px; margin: 0 auto; width: 100%; }
  .card { background: var(--color-surface); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 20px; }
  .btn         { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 500; transition: background .15s; }
  .btn-primary { background: var(--color-primary); color: #fff; }
  .btn-primary:hover { background: var(--color-primary-dk); }
  .btn-danger  { background: var(--color-danger); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--color-primary); border: 1px solid var(--color-border); }
  .confirm-card { border-radius: var(--radius-lg); padding: 32px 24px; text-align: center; animation: slideUp .25s ease; }
  .confirm-card.check-in  { background: #DCFCE7; border: 2px solid var(--color-success); }
  .confirm-card.check-out { background: #DBEAFE; border: 2px solid var(--color-primary); }
  .confirm-card.blocked   { background: #EDE9FE; border: 2px solid var(--color-blocked); }
  .confirm-card.unknown   { background: #FEF3C7; border: 2px solid var(--color-warning); }
  .confirm-card .icon { font-size: 48px; }
  .confirm-card .name { font-size: 22px; font-weight: 700; margin: 12px 0 4px; }
  .confirm-card .meta { color: var(--color-text-muted); font-size: 14px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-chip { background: var(--color-surface); border-radius: var(--radius-md); padding: 18px 16px; box-shadow: var(--shadow-sm); text-align: center; }
  .kpi-chip .value { font-size: 36px; font-weight: 800; }
  .kpi-chip .label { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
  table    { width: 100%; border-collapse: collapse; }
  th, td   { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--color-border); font-size: 14px; }
  th       { font-weight: 600; color: var(--color-text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; background: var(--color-bg); }
  tr:hover { background: #f5f0ee; }
  .badge       { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .badge-green { background: #DCFCE7; color: #166534; }
  .badge-blue  { background: #DBEAFE; color: #1E40AF; }
  .badge-red   { background: #FEE2E2; color: #991B1B; }
  .badge-gray  { background: #F1F5F9; color: #475569; }
  .input { width: 100%; padding: 10px 14px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; outline: none; transition: border-color .15s; }
  .input:focus { border-color: var(--color-primary); }
  label   { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--color-text-muted); }
  .form-group { margin-bottom: 16px; }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @media (max-width: 640px) {
    .page-content { padding: 12px; }
    .kpi-chip .value { font-size: 28px; }
    .hide-mobile { display: none !important; }
  }
  @media print {
    .no-print { display: none !important; }
    body { background: white; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
