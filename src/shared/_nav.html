<style>
  .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--color-surface); border-top: 1px solid var(--color-border); z-index: 100; }
  .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0; font-size: 10px; color: var(--color-text-muted); gap: 3px; }
  .bottom-nav a.active { color: var(--color-primary); }
  .bottom-nav a svg { width: 22px; height: 22px; }
  .top-nav { background: var(--color-surface); border-bottom: 2px solid var(--color-border); padding: 0 28px; display: flex; align-items: center; gap: 4px; height: 52px; }
  .top-nav .logo { font-weight: 800; font-size: 16px; color: var(--color-primary); margin-right: 20px; letter-spacing: 3px; text-transform: uppercase; }
  .top-nav a { padding: 5px 12px; border-radius: var(--radius-sm); color: var(--color-text-muted); font-size: 13px; font-weight: 500; transition: background .15s, color .15s; }
  .top-nav a:hover { background: var(--color-bg); color: var(--color-text); }
  .top-nav a.active { background: rgba(0,6,102,.07); color: var(--color-primary); font-weight: 700; }
  @media (max-width: 640px) {
    .top-nav    { display: none; }
    .bottom-nav { display: flex; }
    .page-content { padding-bottom: 72px; }
  }
</style>

<script>
  (function() {
    var page = (new URLSearchParams(window.location.search)).get('page') || '';
    document.querySelectorAll('#topNav a[data-page], #bottomNav a[data-page]').forEach(function(a) {
      if (a.dataset.page === page) a.classList.add('active');
      a.addEventListener('click', function(e) {
        e.preventDefault();
        var pg = a.dataset.page;
        try {
          var top = window.top || window.parent;
          if (top !== window.self) {
            // Inside GitHub Pages wrapper — signal parent to switch iframe, no reload
            top.postMessage({ qratt_nav: pg }, '*');
          } else {
            // Standalone GAS access — normal navigation
            top.location.href = top.location.href.split('?')[0] + '?page=' + pg;
          }
        } catch(err) {
          window.location.href = '?page=' + pg;
        }
      });
    });
  })();
</script>
