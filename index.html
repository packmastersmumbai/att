<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="QR-based attendance and visitor management system.">
  <title>QR Att. — Attendance System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden; background: #07111F; font-family: system-ui, -apple-system, sans-serif; }

    #loader {
      position: fixed; inset: 0; background: #07111F;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      z-index: 10; transition: opacity 0.3s;
    }
    .loader-logo { display: flex; align-items: center; gap: 14px; }
    .loader-mark {
      width: 44px; height: 44px; background: #000666; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #fff; letter-spacing: 1px;
    }
    .loader-name { font-weight: 800; font-size: 22px; color: #f1f5f9; letter-spacing: 2px; text-transform: uppercase; }
    .loader-sub { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 3px; margin-top: -22px; padding-left: 58px; }
    .loader-bar { width: 180px; height: 2px; background: #1e293b; border-radius: 2px; overflow: hidden; }
    .loader-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #000666, #2563eb, #06b6d4);
      border-radius: 2px; animation: load 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes load { 0%{width:0%;opacity:1} 60%{width:75%} 85%{width:92%} 100%{width:100%} }
    .loader-dots { display: flex; gap: 6px; margin-top: -12px; }
    .loader-dots span { width: 5px; height: 5px; border-radius: 50%; background: #334155; animation: pulse 1.2s ease-in-out infinite; }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{background:#334155;transform:scale(1)} 50%{background:#2563eb;transform:scale(1.4)} }

    #app {
      position: fixed; inset: 0;
      width: 100%; height: 100%; height: 100dvh;
      border: none; opacity: 0; transition: opacity 0.3s;
    }
    #app.ready { opacity: 1; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-logo">
      <div class="loader-mark">QR</div>
      <div class="loader-name">Att.</div>
    </div>
    <div class="loader-sub">Attendance System</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>

  <iframe
    id="app"
    src=""
    allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone"
    allowfullscreen
  ></iframe>

  <script>
    (function() {
      var s = [
        'aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J4WE5VZERlYXZy',
        'Y21uOXM4aVZJYWdkbzgwemdkUmtlZmxuUkVGVkhRYnlFM3JQZU8tQ09BeHJnZWIwQThk',
        'Ykk5Rnp4Zy9leGVj'
      ].join('');
      var base = atob(s);
      var valid = ['scanner','dashboard','reports','visitors','kiosk','admin','idcards'];
      var page = new URLSearchParams(location.search).get('page') || 'kiosk';
      if (valid.indexOf(page) === -1) page = 'kiosk';

      var app = document.getElementById('app');
      var loader = document.getElementById('loader');

      function loadPage(pg) {
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        app.classList.remove('ready');
        app.src = base + '?page=' + pg;
        history.replaceState(null, '', '?page=' + pg);
      }

      loadPage(page);

      app.addEventListener('load', function() {
        app.classList.add('ready');
        loader.style.opacity = '0';
        setTimeout(function() { loader.style.display = 'none'; }, 300);
      });

      // Listen for nav signals from inside the GAS iframe
      window.addEventListener('message', function(e) {
        if (e.data && e.data.qratt_nav && valid.indexOf(e.data.qratt_nav) !== -1) {
          loadPage(e.data.qratt_nav);
        }
      });

      // Fallback: hide loader after 12s if iframe load event doesn't fire
      setTimeout(function() {
        app.classList.add('ready');
        loader.style.display = 'none';
      }, 12000);
    })();
  </script>
</body>
</html>
