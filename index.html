<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="QR-based attendance and visitor management system.">
  <title>QR Att. — Attendance System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden; background: #07111F; font-family: system-ui, -apple-system, sans-serif; }

    #loader {
      position: fixed; inset: 0; background: #07111F;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      z-index: 10; transition: opacity 0.3s;
    }
    .loader-logo { display: flex; align-items: center; gap: 14px; }
    .loader-mark {
      width: 44px; height: 44px; background: #000666; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #fff; letter-spacing: 1px;
    }
    .loader-name { font-weight: 800; font-size: 22px; color: #f1f5f9; letter-spacing: 2px; text-transform: uppercase; }
    .loader-sub { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 3px; margin-top: -22px; padding-left: 58px; }
    .loader-bar { width: 180px; height: 2px; background: #1e293b; border-radius: 2px; overflow: hidden; }
    .loader-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #000666, #2563eb, #06b6d4);
      border-radius: 2px; animation: load 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes load { 0%{width:0%;opacity:1} 60%{width:75%} 85%{width:92%} 100%{width:100%} }
    .loader-dots { display: flex; gap: 6px; margin-top: -12px; }
    .loader-dots span { width: 5px; height: 5px; border-radius: 50%; background: #334155; animation: pulse 1.2s ease-in-out infinite; }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{background:#334155;transform:scale(1)} 50%{background:#2563eb;transform:scale(1.4)} }

    /* The iframe sits BELOW the panel and never captures taps. If Google ever
       allows framing again, `showApp()` lifts it above and re-enables input. */
    #app {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%; height: 100dvh;
      border: none; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #app.ready { opacity: 1; z-index: 30; pointer-events: auto; }

    /* Launcher panel. Google currently refuses to render the web app in a frame
       (its auth interstitial sends X-Frame-Options: SAMEORIGIN), and a blocked
       cross-origin iframe is undetectable from here — so the portal shows this
       and opens the app directly. */
    #blocked {
      display: flex; position: fixed; inset: 0; z-index: 20; background: #07111F;
      align-items: center; justify-content: center; padding: 24px;
    }
    .bk-card { max-width: 380px; text-align: center; color: #e2e8f0; }
    .bk-mark {
      width: 52px; height: 52px; margin: 0 auto 16px; background: #000666; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #fff; letter-spacing: 1px;
    }
    .bk-title { font-size: 19px; font-weight: 800; margin-bottom: 10px; }
    .bk-text { font-size: 13px; line-height: 1.65; color: #94a3b8; margin-bottom: 20px; }
    .bk-btn {
      display: block; padding: 14px; border-radius: 10px; background: #2563eb; color: #fff;
      font-size: 15px; font-weight: 700; text-decoration: none;
    }
    .bk-hint { font-size: 11px; color: #475569; margin-top: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-logo">
      <div class="loader-mark">QR</div>
      <div class="loader-name">Att.</div>
    </div>
    <div class="loader-sub">Attendance System</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>

  <iframe
    id="app"
    src=""
    allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone"
    allowfullscreen
  ></iframe>

  <!-- Shown when Google refuses to render the app in this frame (logged-in users
       get redirected to an auth page that sets X-Frame-Options: SAMEORIGIN). -->
  <div id="blocked">
    <div class="bk-card">
      <div class="bk-mark">QR</div>
      <div class="bk-title">QR Attendance</div>
      <div class="bk-text">Tap below to open the attendance app.</div>
      <a id="blockedLink" class="bk-btn" href="#">Open the app →</a>
      <div class="bk-hint">Add this page to your home screen for quick access.</div>
    </div>
  </div>

  <script>
    (function() {
      var base = 'https://script.google.com/macros/s/AKfycbzkGp766lCPYqhitkbYsv0jQGPtBE_dLzpc3CiwuXIWmm7CbFps4XMTb5kmxLAryR0CMQ/exec';
      var valid = ['scanner','dashboard','reports','visitors','kiosk','admin','idcards'];
      var page = new URLSearchParams(location.search).get('page') || 'kiosk';
      if (valid.indexOf(page) === -1) page = 'kiosk';

      var app = document.getElementById('app');
      var loader = document.getElementById('loader');

      // No auto-redirect to the raw GAS URL: in incognito the iframe can take >4s,
      // and bouncing there exposed the ugly script.google.com URL. We always stay
      // on the portal; the existing 12s loader timeout stops a spinner hanging.
      var iframeLoaded = false;

      function loadPage(pg) {
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        app.classList.remove('ready');
        app.src = base + '?page=' + pg + '&v=100';
        history.replaceState(null, '', '?page=' + pg);
      }

      // Deliberately NOT loading the iframe. Google refuses to frame the web app
      // (its auth interstitial sends X-Frame-Options: SAMEORIGIN) and a blocked
      // cross-origin iframe is undetectable from the parent — it fires no usable
      // event, exposes no child frames, and its postMessages never arrive. So the
      // portal acts as a launcher and opens the app directly.
      document.getElementById('blockedLink').href = base + '?page=' + page + '&v=100';
      history.replaceState(null, '', '?page=' + page);
      loader.style.display = 'none';

      // If Google ever allows framing again, the app's nav ping proves it rendered;
      // lift the iframe above the launcher at that point.
      window.addEventListener('message', function(e) {
        if (e.data && e.data.qratt_nav && valid.indexOf(e.data.qratt_nav) !== -1) {
          loadPage(e.data.qratt_nav);
          document.getElementById('blockedLink').href = base + '?page=' + e.data.qratt_nav + '&v=100';
        }
      });
    })();
  </script>
</body>
</html>
